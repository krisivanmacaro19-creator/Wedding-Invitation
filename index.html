<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Our Wedding Invitation</title>
    
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Alex+Brush&family=Great+Vibes&family=Playfair+Display:ital,wght=0,400..900;1,400..900&family=Montserrat:wght=300;400;500;600&display=swap');

        :root {
            --primary-rustic: #2c3e26;     /* Deep Forest/Sage tone */
            --accent-gold: #b3864c;        /* Muted Gold/Amber */
            --terracotta: #a8583b;          /* Earthy Terracotta */
            --bg-creame: #f6f3ea;          /* Warm Earthy Background */
            --text-dark: #3a352e;          /* Soft Charcoal Brown */
            --card-bg: #ffffff;
            
            /* Attire Guide Custom Palette */
            --brown: #5C4033;
            --tan: #B18967;
            --nude: #D2B48C;
            --beige: #E6D7C3;
            --cream: #FDF5E6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-creame);
            color: var(--text-dark);
            line-height: 1.6;
            text-align: center;
            -webkit-text-size-adjust: 100%;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(44, 62, 38, 0.45), rgba(58, 53, 46, 0.5)), 
                        url('image3.png') no-repeat center center/cover;
            padding: 20px;
            color: #ffffff;
            position: relative;
        }
        @media (max-width: 768px) {
            .hero {
                height: 100dvh;
                background: linear-gradient(rgba(44, 62, 38, 0.5), rgba(58, 53, 46, 0.55)), 
                            url('image3-mobile.png') no-repeat center center/cover;
            }
        }

        .hero::after {
            content: '';
            position: absolute;
            top: 20px; bottom: 20px; left: 20px; right: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none;
        }

        .hero p {
            font-size: clamp(0.85rem, 2.5vw, 1.1rem);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 300;
            color: #fcfaf2;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        }

        .hero h1 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3.8rem, 10vw, 8rem);
            color: #fdfbf7;
            margin: 10px 0;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.4);
            font-weight: normal;
            letter-spacing: 2px;
            line-height: 1.1;
        }

        .hero .date {
            margin-top: 25px;
            font-weight: 500;
            border-top: 1px solid rgba(255, 255, 255, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.6);
            padding: 12px 35px;
            font-size: clamp(1rem, 3vw, 1.4rem);
            letter-spacing: 3px;
            background: rgba(44, 62, 38, 0.2);
            backdrop-filter: blur(3px);
        }

        /* --- OUR STORY --- */
        .story-section {
            padding: clamp(50px, 8vw, 100px) 20px;
            max-width: 950px;
            margin: 0 auto;
        }

        .story-container {
            display: flex;
            align-items: center;
            gap: 50px;
            text-align: left;
            background: var(--card-bg);
            padding: 45px 35px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(44, 62, 38, 0.04);
            border: 1px solid #f2ede4;
        }

        .story-img {
            width: 45%;
            height: auto;
            max-height: 400px;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            object-fit: cover;
            object-position: center;
        }

        .story-text {
            width: 55%;
        }

        .story-text h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.8rem, 6vw, 3.8rem);
            color: var(--primary-rustic);
            margin-bottom: 15px;
            font-weight: normal;
            line-height: 1.2;
        }

        .story-text p {
            color: #5a554e;
            font-size: clamp(0.95rem, 2vw, 1.05rem);
        }

        /* --- PRENUP VIDEO --- */
        .video-section {
            padding: clamp(50px, 6vw, 80px) 20px;
            background-color: #f2ede4;
        }

        .video-section h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.8rem, 6vw, 3.8rem);
            color: var(--primary-rustic);
            margin-bottom: 25px;
            font-weight: normal;
        }

        .video-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            padding-bottom: 56.25%; 
            height: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 12px 35px rgba(44, 62, 38, 0.15);
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%; border: 0;
        }

        /* --- COUNTDOWN --- */
        .countdown-container {
            background-color: var(--primary-rustic);
            color: #ffffff;
            padding: 50px 15px;
        }

        .countdown-container h2 {
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            color: var(--accent-gold);
            margin-bottom: 25px;
        }

        .countdown {
            display: flex;
            justify-content: center;
            gap: clamp(10px, 3vw, 25px);
            flex-wrap: nowrap;
        }

        .time-box {
            background: rgba(255, 255, 255, 0.06);
            padding: clamp(10px, 2.5vw, 20px);
            border-radius: 8px;
            flex: 1;
            max-width: 110px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: clamp(0.65rem, 1.8vw, 0.85rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #e3dece;
        }

        .time-box span {
            display: block;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 300;
            color: #ffffff;
            line-height: 1.2;
            margin-bottom: 5px;
        }

        /* --- DETAILS CARD --- */
        .details {
            padding: clamp(50px, 8vw, 100px) 20px;
            max-width: 850px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            padding: clamp(35px, 6vw, 60px) clamp(20px, 5vw, 50px);
            border-radius: 4px;
            box-shadow: 0 15px 45px rgba(58, 53, 46, 0.08);
            border-top: 4px solid var(--accent-gold);
            border-bottom: 4px solid var(--accent-gold);
        }

        .section-title {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 7vw, 4rem);
            color: var(--accent-gold);
            margin-bottom: 10px;
            font-weight: normal;
        }

        .card p strong {
            letter-spacing: 1.5px;
            color: var(--text-dark);
            font-size: clamp(0.95rem, 2vw, 1.1rem);
        }

        .venue-text {
            margin: 15px 0;
            color: #5a554e;
            font-size: clamp(0.95rem, 2vw, 1.05rem);
        }

        .italic-follow {
            font-style: italic;
            color: #7a7368;
            font-size: clamp(0.95rem, 2vw, 1.1rem);
            margin-bottom: 20px;
        }

        .rustic-divider {
            border: 0;
            border-top: 1px dashed #d1c7bd;
            margin: clamp(30px, 5vw, 45px) 0;
        }

        /* --- ATTIRE GUIDE --- */
        .attire-section-header {
            margin-bottom: 25px;
        }
        .attire-section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.2rem, 5vw, 3rem);
            color: var(--primary-rustic);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .attire-section-header .attire-script {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 7vw, 4.5rem);
            color: var(--accent-gold);
            line-height: 0.8;
            margin-bottom: 15px;
            display: block;
        }
        .attire-section-header p {
            font-size: clamp(0.75rem, 2vw, 0.85rem);
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dark);
            font-weight: 600;
        }

        .download-guide-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: var(--accent-gold);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            margin: 15px 0 25px 0;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(179, 134, 76, 0.2);
            border: none;
            cursor: pointer;
        }
        .download-guide-btn:hover {
            background-color: var(--primary-rustic);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(44, 62, 38, 0.25);
        }

        .attire-image-wrapper {
            max-width: 500px;
            margin: 0 auto 20px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(58, 53, 46, 0.15);
            border: 4px solid #ffffff;
            background-color: #ffffff;
            cursor: zoom-in;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .attire-image-wrapper:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(58, 53, 46, 0.22);
        }

        .attire-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .zoom-hint {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: #ffffff;
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: none;
            opacity: 0.85;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }

        .attire-image-wrapper:hover .zoom-hint {
            opacity: 1;
        }

        /* --- LIGHTBOX MODAL --- */
        .attire-lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(58, 53, 46, 0.95);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .attire-lightbox.active {
            display: flex;
            opacity: 1;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 85%;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
            object-fit: contain;
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .attire-lightbox.active .lightbox-content {
            transform: scale(1);
        }

        .lightbox-close {
            position: absolute;
            top: 25px;
            right: 25px;
            color: #ffffff;
            font-size: 35px;
            font-weight: 300;
            cursor: pointer;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* --- REMINDER BOX --- */
        .reminder-box {
            background: #faf8f5;
            padding: clamp(25px, 4vw, 35px) clamp(15px, 3vw, 30px);
            border-radius: 4px;
            margin-top: 40px;
            border: 1px dashed var(--accent-gold);
        }

        .reminder-box h4 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(2.2rem, 5vw, 2.8rem);
            color: var(--accent-gold);
            margin-bottom: 8px;
            font-weight: normal;
        }

        .reminder-box p {
            font-size: clamp(0.85rem, 2vw, 0.95rem);
            color: #635d54;
        }

        .reminder-box .highlight-no {
            font-weight: 600;
            color: #a43b3b;
            display: block;
            margin-top: 15px;
            letter-spacing: 1.5px;
            font-size: 0.8rem;
        }

        /* --- RSVP SECTION --- */
        .rsvp-section {
            background-color: #ebdcc5;
            padding: clamp(50px, 8vw, 100px) 20px;
        }

        .rsvp-container {
            max-width: 950px;
            margin: 0 auto;
            display: flex;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(44, 62, 38, 0.12);
        }

        .rsvp-image {
            width: 45%;
            background: url('image1.png') no-repeat center center/cover;
        }

        form {
            width: 55%;
            padding: clamp(35px, 5vw, 60px) clamp(20px, 4vw, 50px);
            text-align: left;
        }

        form h2 {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(3rem, 7vw, 4rem);
            color: var(--primary-rustic);
            line-height: 1;
            margin-bottom: 12px;
            font-weight: normal;
        }

        form p {
            color: #6e675d;
            font-size: clamp(0.9rem, 2vw, 0.95rem);
            margin-bottom: 20px;
        }

        .form-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            margin-bottom: 6px; 
            font-weight: 500; 
            font-size: 0.8rem; 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary-rustic);
        }
        
        input, select, textarea { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #dcd3c7; 
            border-radius: 6px; 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            outline: none;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-rustic);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.95rem;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 10px;
        }

        /* 3. HCAPTCHA STYLING (Para maging responsive at pantay sa mobile at desktop) */
        .captcha-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: flex-start;
        }
        @media (max-width: 768px) {
            .captcha-container {
                justify-content: center; /* Gitna kapag smartphone */
            }
        }

        /* --- RESPONSIVE MEDIA FOR SMARTPHONES (CP) --- */
        @media (max-width: 768px) {
            .story-container, .rsvp-container {
                flex-direction: column;
                gap: 25px;
                padding: 25px 15px;
            }
            .story-img, .story-text, .rsvp-image, form {
                width: 100%;
            }
            .story-img {
                max-height: 260px;
            }
            .story-text {
                text-align: center;
            }
            .rsvp-image {
                height: 220px;
            }
            .download-guide-btn {
                width: 100%;
                box-sizing: border-box;
            }
            .attire-image-wrapper {
                max-width: 100%;
                border-radius: 8px;
            }
            .lightbox-close {
                top: 15px;
                right: 15px;
            }
        }

        footer { 
            padding: 40px 20px; 
            font-size: 0.85rem; 
            background: #ffffff; 
            color: #7a7368;
            letter-spacing: 0.5px;
        }
        
        /* --- TIMELINE SECTION --- */
        .timeline-section {
            padding: clamp(50px, 8vw, 100px) 20px;
            background-color: var(--bg-creame);
        }

        .timeline-container {
            max-width: 580px;
            margin: 40px auto;
            background: #e9dbca; 
            background-image: repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(110, 80, 50, 0.04) 48px, rgba(110, 80, 50, 0.04) 50px);
            border: 6px solid #b18967;
            border-bottom: 10px solid #997554;
            border-radius: 200px 200px 20px 20px;
            padding: 90px 30px 40px 30px;
            box-shadow: 0 15px 40px rgba(58, 53, 46, 0.15);
            position: relative;
        }

        .timeline-container::before {
            content: '';
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 20px;
            background: #997554;
            border: 6px solid #b18967;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            z-index: 1;
        }

        .timeline-container::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 44px;
            height: 30px;
            background: #997554;
            border: 6px solid #b18967;
            border-top: none;
            border-radius: 0 0 6px 6px;
            z-index: 1;
        }

        .timeline-svg-title {
            width: 100%;
            height: 75px;
            margin-bottom: 20px;
            display: block;
        }

        .timeline-pathway {
            position: relative;
            margin: 30px auto;
            width: 3px;
            background-color: #3a352e; 
            height: 520px; 
        }

        .timeline-node {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            width: 420px;
            pointer-events: none;
        }

        .timeline-node:nth-child(1) { top: 20px; }
        .timeline-node:nth-child(2) { top: 120px; }
        .timeline-node:nth-child(3) { top: 220px; }
        .timeline-node:nth-child(4) { top: 320px; }
        .timeline-node:nth-child(5) { top: 420px; }

        .timeline-node-dot {
            width: 10px;
            height: 10px;
            background-color: #3a352e;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 0 4px #e9dbca;
            z-index: 2;
        }

        .timeline-content-card {
            width: 190px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: absolute;
        }

        .timeline-node.left .timeline-content-card {
            right: calc(50% + 25px);
        }

        .timeline-node.right .timeline-content-card {
            left: calc(50% + 25px);
        }

        .timeline-icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 6px;
            transition: transform 0.3s ease;
        }

        .timeline-node:hover .timeline-icon-box {
            transform: scale(1.1);
        }

        .timeline-icon-box svg {
            width: 42px;
            height: 42px;
            stroke: #5c4533; 
            fill: none;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .timeline-event-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #3a352e;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
            line-height: 1.2;
        }

        .timeline-event-time {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: #70553e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 550px) {
            .timeline-container {
                max-width: 100%;
                border-radius: 120px 120px 20px 20px;
                padding-top: 75px;
            }

            .timeline-pathway {
                margin: 20px 0 20px 25px; 
                height: 580px;
            }

            .timeline-node {
                width: 100%;
                left: 0;
                transform: none;
            }
            
            .timeline-node:nth-child(1) { top: 20px; }
            .timeline-node:nth-child(2) { top: 130px; }
            .timeline-node:nth-child(3) { top: 240px; }
            .timeline-node:nth-child(4) { top: 350px; }
            .timeline-node:nth-child(5) { top: 460px; }

            .timeline-node-dot {
                left: 0;
                transform: translateX(-50%);
            }

            .timeline-content-card {
                left: 30px !important;
                right: auto !important;
                width: calc(100% - 60px);
                flex-direction: row;
                text-align: left;
                align-items: center;
                gap: 15px;
            }

            .timeline-icon-box {
                margin-bottom: 0;
                width: 44px;
                height: 44px;
            }

            .timeline-icon-box svg {
                width: 36px;
                height: 36px;
            }

            .timeline-text-group {
                display: flex;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

    <section class="hero">
        <p>Together with their families</p>
        <h1>Rola & Ivan</h1>
        <p>Invite you to celebrate their marriage</p>
        <div class="date">JULY 26, 2026</div>
    </section>

    <section class="story-section">
        <div class="story-container">
            <img class="story-img" src="image2.png" alt="Our Story Photo">
            <div class="story-text">
                <h2>Our Story</h2>
                <p>Mula sa simpleng pagtitinginan, hanggang sa napagdesisyunan naming magsama habambuhay. Hinihiling namin ang inyong gabi upang saksihan ang aming walang hanggang sumpaan.</p>
            </div>
        </div>
    </section>

    <section class="video-section">
        <h2>Our Prenup Video</h2>
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/jyyf9vXm6H0?rel=0&modestbranding=1" 
                title="Test Wedding Video"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen>
            </table>

                <h2>RSVP</h2>
                <p>Please let us know if you can make it.</p>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" name="name" required placeholder="Juan Dela Cruz">
                </div>
                
                <div class="form-group">
                    <label for="attendance">Will you attend?</label>
                    <select id="attendance" name="attendance" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="yes">Yes, I will be there</option>
                        <option value="no">No, I cannot make it</option>

                </div>

                <div class="captcha-container">
                    <div class="h-captcha" data-sitekey="10000000-ffff-ffff-ffff-000000000001"></div>
